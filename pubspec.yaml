name: series_watcher_fschmatz
description: "A Flutter project to track series using TMDB API"
publish_to: 'none'
version: 1.4.3

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.3
  share_plus: ^10.0.0
  url_launcher: ^6.3.1
  easy_dynamic_theme: ^2.3.1
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  flutter_image_compress: ^2.4.0
  permission_handler: ^11.3.0
  async_redux: ^25.4.0
  dynamic_system_colors: ^1.9.0
  animations: ^2.0.11
  http: ^1.6.0
  jiffy: ^6.4.4
  home_widget: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true

  assets:
    - assets/


